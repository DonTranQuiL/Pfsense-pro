update_alias:
  name: Update Firewall Alias
  description: Dynamically adds or removes an IP address or hostname from a pfSense alias group.
  fields:
    entity_id:
      name: Entity ID
      description: Any active pfSense tracking entity id to route the command.
      required: true
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    alias_name:
      name: Alias Name
      description: The exact name of the alias group in pfSense (e.g., Kids_Devices).
      required: true
      example: "Kids_Devices"
    address:
      name: Target Address
      description: The exact IP address or Hostname to add or remove.
      required: true
      example: "192.168.1.50"
    action:
      name: Action
      description: Select whether to add the address to isolate it or remove it to restore access.
      required: true
      default: "add"
      selector:
        select:
          options:
            - "add"
            - "remove"

close_notice:
  name: Close notice
  description: Closes a notice(s).
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    id:
      name: Notice ID
      description: The notice ID
      required: false
      advanced: false
      example: "all"
      default: "all"

file_notice:
  name: File notice
  description: Files a notice(s).
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    id:
      name: Notice ID
      description: The notice ID
      required: true
      advanced: false
      example: "all"
      default: "all"
    notice:
      name: Notice message
      description: The notice message
      required: true
      advanced: false
      example: "hello world from hass"
      default: ""
    category:
      name: Notice category
      description: The category of the notice
      required: false
      advanced: true
      example: "General"
      default: "HASS"
    url:
      name: Notice url
      description: The url of the notice
      required: false
      advanced: true
      example: "https://example.com"
      default: ""
    priority:
      name: Notice priority
      description: The priority of the notice
      required: false
      advanced: true
      example: 1
      default: 1
    local_only:
      name: Only show in the UI
      description: Do not send the notice via email, etc
      required: false
      advanced: true
      example: false
      default: false

start_service:
  name: Start service
  description: Starts a service.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    service_name:
      name: Service Name
      description: The name of the service.
      required: true
      advanced: false
      example: "haproxy|dhcp|dpinger|.."
      default: ""
    service:
      name: Service Data
      description: The json-encoded data of the service.
      required: false
      advanced: true
      example: '{"vpnid": 1, "mode": "server"}'
      default: ""

stop_service:
  name: Stop service
  description: Stops a service.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    service_name:
      name: Service Name
      description: The name of the service.
      required: true
      advanced: false
      example: "haproxy|dhcp|dpinger|.."
      default: ""
    service:
      name: Service Data
      description: The json-encoded data of the service.
      required: false
      advanced: true
      example: '{"vpnid": 1, "mode": "server"}'
      default: ""

restart_service:
  name: Restart service
  description: Restarts a service.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    service_name:
      name: Service Name
      description: The name of the service.
      required: true
      advanced: false
      example: "haproxy|dhcp|dpinger|.."
      default: ""
    only_if_running:
      name: Only If Running
      description: Only restart if the service is currently running.
      required: false
      advanced: true
      example: "true|false|1|0"
      default: false
    service:
      name: Service Data
      description: The json-encoded data of the service.
      required: false
      advanced: true
      example: '{"vpnid": 1, "mode": "server"}'
      default: ""

reset_state_table:
  name: Reset state table
  description: Force all existing connections to close and reestablish 
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"

kill_states:
  name: Kill states
  description: Remove all state table entries for source, or from source to destination
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    source:
      name: Source
      description: Host or network
      required: true
      advanced: false
      example: "0.0.0.0/0"
      default: ""
    destination: 
      name: Destination
      description: Host or network (optional)
      required: false
      advanced: false
      example: "192.168.0.1/24"
      default: ""

system_halt:
  name: Halt system
  description: Halts the system.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"

system_reboot:
  name: Reboot system
  description: Reboots the system.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"

send_wol:
  name: Send WOL
  description: Sends wake-on-lan magic packet.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    interface:
      name: Interface Name
      description: The name of the interface.
      required: true
      advanced: false
      example: "wan|lan|opt1|opt2|..."
      default: ""
    mac:
      name: MAC Address
      description: The target mac address.
      required: true
      advanced: false
      example: ""
      default: ""

set_default_gateway:
  name: Set Default Gateway
  description: Set the default gateway for ipv4 and ipv6.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    gateway:
      name: Gateway Name
      description: The name of the gateway.
      required: true
      advanced: false
      example: "GW_WAN, '-' is None and '' is Automatice"
      default: ""
    ip_version:
      name: IP Version
      description: The IP version to update.
      required: true
      advanced: false
      example: "4|6"
      default: "4"

exec_php:
  name: Exec PHP Script
  description: Execute a fully php script.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    script:
      name: Gateway Name
      description: The name of the gateway.
      required: true
      advanced: false
      example: "GW_WAN, '-' is None and '' is Automatice"
      default: ""

exec_command:
  name: Exec Command
  description: Execute a command.
  fields:
    entity_id:
      name: Entity ID
      description: pfSense entity id
      example: "binary_sensor.pfsense_localdomain_pending_notices_present"
    command:
      name: Command
      description: The command to run.
      required: true
      advanced: false
      example: "ping -c 1 yahoo.com"
      default: ""