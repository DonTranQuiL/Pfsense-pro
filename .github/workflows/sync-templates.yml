name: Central AI Template Sync

on:
  push:
    branches: [ main ]
    paths:
      # Trigger sync only when template files are updated
      - 'ai_engineer/dependency_updater.py'
      - 'ai_engineer/issue_resolver.py'
      - 'ai_engineer/release_writer.py'
      - 'ai_engineer/repair.py'
      - 'ai_engineer/reviewer.py'
      - 'ai_engineer/test_writer.py'
      - '.github/workflows/ai-aviation-watcher.yml'
      - '.github/workflows/ai-dependency-updater.yml'
      - '.github/workflows/ai-feed-watcher.yml'
      - '.github/workflows/ai-issue-resolver.yml'
      - '.github/workflows/ai-release.yml'
      - '.github/workflows/ai-repair.yml'
      - '.github/workflows/ai-review.yml'
      - '.github/workflows/ai-test-writer.yml'

jobs:
  sync-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Template Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Distribute Tooling Upgrades
        env:
          SYNC_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          # 1. Define target repositories to update
          TARGET_REPOS=(
            "DonTranQuiL/ADSB-For-Home-assistant"
            "DonTranQuiL/Global-Earthquake-Tracker-for-Home-Assistant"
            "DonTranQuiL/HA-Weerplaza"
            "DonTranQuiL/Nova-Conversation"
            "DonTranQuiL/knmi_seismisch"
            "DonTranQuiL/Bekendmakingen"
            "DonTranQuiL/Enever_prijzen"
            "DonTranQuiL/entsoe_prijzen"
            "DonTranQuiL/ha-ndw-verkeer"
            "DonTranQuiL/smart-wardrobe"
            "DonTranQuiL/virtual-battery-controller"
            "DonTranQuiL/ha-p2000"
            



            
          )

          # 2. Define global core files (always overwritten/created)
          GLOBAL_FILES=(
            "ai_engineer/dependency_updater.py"
            "ai_engineer/issue_resolver.py"
            "ai_engineer/release_writer.py"
            "ai_engineer/repair.py"
            "ai_engineer/reviewer.py"
            "ai_engineer/test_writer.py"
            ".github/workflows/ai-dependency-updater.yml"
            ".github/workflows/ai-release.yml"
            ".github/workflows/ai-repair.yml"
            ".github/workflows/ai-review.yml"
            ".github/workflows/ai-test-writer.yml"
            ".github/workflows/ai-issue-resolver.yml"
          )

          # 3. Define conditional files (only updated if they ALREADY exist in target repo)
          CONDITIONAL_FILES=(
            ".github/workflows/ai-aviation-watcher.yml"
            ".github/workflows/ai-feed-watcher.yml"
          )

          for REPO in "${TARGET_REPOS[@]}"; do
            echo "=========================================================="
            echo "🚀 CLONING AND SYNCHRONIZING TARGET: $REPO"
            echo "=========================================================="
            
            TEMP_DIR="sync_workdir"
            rm -rf $TEMP_DIR
            
            # Clone with full write permissions using the PAT
            git clone "https://x-access-token:${SYNC_TOKEN}@github.com/${REPO}.git" $TEMP_DIR

            # A. Copy core global scripts & workflows
            for FILE in "${GLOBAL_FILES[@]}"; do
              if [ -f "$FILE" ]; then
                mkdir -p "$TEMP_DIR/$(dirname "$FILE")"
                cp -f "$FILE" "$TEMP_DIR/$FILE"
                echo "✔️ Copied core file: $FILE"
              fi
            done

            # B. Copy repository-specific files conditionally
            for FILE in "${CONDITIONAL_FILES[@]}"; do
              if [ -f "$TEMP_DIR/$FILE" ]; then
                cp -f "$FILE" "$TEMP_DIR/$FILE"
                echo "✔️ Updated conditional file: $FILE"
              else
                echo "ℹ️ Skipped conditional file (not in target): $FILE"
              fi
            done

            # Navigate to cloned directory to check for changes
            cd $TEMP_DIR

            # Stage changes
            git add .

            # Push changes only if there's an actual difference
            if [ -n "$(git status --porcelain)" ]; then
              echo "📝 Changes detected. Committing sync..."
              git commit -m "chore(template): sync AI tooling and workflows from template repository [skip ci]"
              git push origin main
              echo "✅ Successfully synced updates to $REPO!"
            else
              echo "✨ $REPO is already identical to template. No push needed."
            fi

            # Clean up work directory
            cd ..
            rm -rf $TEMP_DIR
          done
