name: AI Release Notes Manager

on:
  release:
    types: [published]

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
    
      - name: Install Dependencies
        run: pip install requests openai
    
      - name: Get commit messages and actual code changes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "First release. Grabbing all history."
            git log --pretty=format:"TITLE: %s%nDESCRIPTION: %b%n---" > changelog.txt
            echo -e "\n\n--- ACTUAL CODE CHANGES ---" >> changelog.txt
            # Scan changes across the entire repository instead of searching for specific folders
            git diff $(git rev-list --max-parents=0 HEAD)..HEAD >> changelog.txt
          else
            echo "Comparing changes between $PREV_TAG and current release."
            git log $PREV_TAG..HEAD --pretty=format:"TITLE: %s%nDESCRIPTION: %b%n---" > changelog.txt
            echo -e "\n\n--- ACTUAL CODE CHANGES ---" >> changelog.txt
            # Scan changes across the entire repository instead of searching for specific folders
            git diff $PREV_TAG..HEAD >> changelog.txt
          fi
    
      - name: Run AI Release Writer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
        run: python ai_engineer/release_writer.py
        
      - name: Get commit messages and actual code changes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "First release. Grabbing all history."
            git log --pretty=format:"TITLE: %s%nDESCRIPTION: %b%n---" > changelog.txt
            echo -e "\n\n--- ACTUAL CODE CHANGES ---" >> changelog.txt
            # Grab all code changes since the beginning of time
            git diff $(git rev-list --max-parents=0 HEAD)..HEAD -- 'custom_components/**' 'tests/**' >> changelog.txt
          else
            echo "Comparing changes between $PREV_TAG and current release."
            git log $PREV_TAG..HEAD --pretty=format:"TITLE: %s%nDESCRIPTION: %b%n---" > changelog.txt
            echo -e "\n\n--- ACTUAL CODE CHANGES ---" >> changelog.txt
            # Grab only the changes made between the last release and now
            git diff $PREV_TAG..HEAD -- 'custom_components/**' 'tests/**' >> changelog.txt
          fi
